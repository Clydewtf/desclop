name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0-alpha.1"
        required: true
        type: string
      platform:
        description: "Platform to build"
        default: all
        required: true
        type: choice
        options:
          - all
          - macos-latest
          - ubuntu-22.04
          - windows-latest

jobs:
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/quality-gate.yml
    with:
      ref: ${{ github.event.inputs.tag || github.ref_name }}

  publish-tauri:
    name: Build ${{ matrix.platform }}
    needs: quality-gate
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: "--bundles nsis"
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: ${{ matrix.platform == 'ubuntu-22.04' && (github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform) }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        run: npm ci

      - name: Build and publish Tauri release
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.platform }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Desclop ${{ env.RELEASE_TAG }}
          generateReleaseNotes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          releaseDraft: false
          uploadUpdaterJson: false
          args: ${{ matrix.args }}
